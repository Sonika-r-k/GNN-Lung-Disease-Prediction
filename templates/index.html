<!DOCTYPE html>
<html>
<head>
<title>Lung Disease Dashboard</title>

<style>
body{
margin:0;
font-family: Arial;
background:#e6f0ff;
}

.header{
background:#0a4fa3;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.upload-box{
background:white;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

button{
background:#0a4fa3;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

input[type=file]{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
🏥 AI Lung Disease Detection
</div>

<div class="container">
<div class="upload-box">
<h3>Upload X-Ray</h3>

<form method="POST" action="/predict" enctype="multipart/form-data">
<input type="file" name="file" required><br><br>
<button>Analyze</button>
</form>

</div>
</div>

</body>
</html>
